<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 2: Billing Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .header-card {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            flex: 1;
        }
        button {
            padding: 10px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
        .btn-calc {
            background-color: #007bff;
            width: 100%;
            margin-top: 10px;
            font-size: 16px;
        }
        .btn-calc:hover {
            background-color: #0056b3;
        }
        #bill-output {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border: 1px dashed #ccc;
            white-space: pre-wrap; /* Preserves spacing for template literals */
            font-family: monospace;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="header-card">
        <h2>Experiment 2: Modern JavaScript Features</h2>
        <p><strong>Name:</strong> Tanumay Chatterjee | <strong>PRN:</strong> 24070521127</p>
        <p><strong>Batch:</strong> 2024-2028 | CSE 2nd Year, SIT Nagpur</p>
    </div>

    <h3>Billing Calculator</h3>
    
    <div class="input-group">
        <input type="text" id="itemName" placeholder="Item Name (e.g., Laptop)">
        <input type="number" id="itemPrice" placeholder="Price (₹)">
        <input type="number" id="itemQty" placeholder="Quantity">
        <button onclick="addItem()">Add Item</button>
    </div>

    <button class="btn-calc" onclick="generateBill()">Generate Final Bill</button>

    <div id="bill-output">Your bill will appear here...</div>

    <script src="script.js"></script>
</body>
</html>
