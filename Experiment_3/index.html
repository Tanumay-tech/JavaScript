<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 3: Grading System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .header-card {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none; /* Hidden until calculation */
            font-size: 16px;
            line-height: 1.5;
        }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>

    <div class="header-card">
        <h2>Experiment 3: Control Structures & Validation</h2>
        <p><strong>Name:</strong> Tanumay Chatterjee | <strong>PRN:</strong> 24070521127</p>
        <p><strong>Batch:</strong> 2024-2028 | CSE 2nd Year, SIT Nagpur</p>
    </div>

    <h3>Student Grading System</h3>
    
    <div class="form-group">
        <label for="dsMarks">Data Structures (out of 100):</label>
        <input type="number" id="dsMarks" placeholder="Enter marks (0-100)">
    </div>
    
    <div class="form-group">
        <label for="webMarks">Web Development (out of 100):</label>
        <input type="number" id="webMarks" placeholder="Enter marks (0-100)">
    </div>

    <div class="form-group">
        <label for="mathMarks">Engineering Mathematics (out of 100):</label>
        <input type="number" id="mathMarks" placeholder="Enter marks (0-100)">
    </div>

    <button onclick="processGrades()">Calculate Final Grade</button>

    <div id="result-box"></div>

    <script src="script.js"></script>
</body>
</html>
